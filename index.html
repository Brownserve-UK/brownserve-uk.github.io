<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brownserve Documentation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
    }

    .module-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .module-card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }

    .module-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 0.4rem;
    }

    .module-card p {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.5;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #484f58;
    }

    footer a {
      color: #484f58;
      text-decoration: none;
    }

    footer a:hover {
      color: #8b949e;
    }
  </style>
</head>
<body>
  <header>
    <h1>Brownserve Documentation</h1>
    <p>Reference documentation for Brownserve PowerShell modules.</p>
  </header>

  <main class="modules">
    <a class="module-card" href="/Brownserve.PSTools/">
      <h2>Brownserve.PSTools</h2>
      <p>A collection of PowerShell tools used across Brownserve projects.</p>
    </a>
    <!-- Add further module cards here as new modules are documented -->
  </main>

  <footer>
    <a href="https://github.com/Brownserve-UK">github.com/Brownserve-UK</a>
  </footer>
</body>
</html>
